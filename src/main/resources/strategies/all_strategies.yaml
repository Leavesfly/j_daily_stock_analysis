# 股票分析策略配置(完整版)

# 底部放量策略
bottom_volume:
  name: "底部放量"
  description: "股价在低位区间出现显著放量，可能是主力建仓信号"
  conditions:
    price_near_low: true
    volume_ratio_min: 2.0
    consecutive_days: 2
  score_weight: 15

# 箱体震荡策略
box_oscillation:
  name: "箱体震荡"
  description: "股价在一个明确的上下轨范围内波动"
  conditions:
    range_days: 20
    amplitude_max_pct: 15
    breakout_volume_ratio: 1.8
  score_weight: 10

# 牛趋势策略
bull_trend:
  name: "牛趋势"
  description: "MA5 > MA10 > MA20 > MA60 多头排列，趋势明确向上"
  conditions:
    ma_alignment: "bullish"
    min_days: 5
    pullback_max_pct: 5
  score_weight: 20

# 缠论策略
chan_theory:
  name: "缠论"
  description: "基于缠中说禅理论的买卖点判断"
  conditions:
    divergence: true
    center_break: true
  score_weight: 12

# 龙头首板策略
dragon_head:
  name: "龙头首板"
  description: "板块龙头股首次涨停，后续可能有连板空间"
  conditions:
    limit_up: true
    is_sector_leader: true
    turnover_ratio_min: 5
  score_weight: 18

# 情绪周期策略
emotion_cycle:
  name: "情绪周期"
  description: "根据市场情绪周期(冰点→回暖→高潮→退潮)择时"
  conditions:
    cycle_phase: "recovery"
    sentiment_score_min: -50
  score_weight: 10

# 事件驱动策略
event_driven:
  name: "事件驱动"
  description: "重大事件(政策/财报/并购)驱动的价值重估"
  conditions:
    has_major_event: true
    event_freshness_days: 3
  score_weight: 15

# 预期重定价策略
expectation_repricing:
  name: "预期重定价"
  description: "基本面预期发生重大变化导致估值重估"
  conditions:
    eps_revision_pct: 20
    analyst_upgrade: true
  score_weight: 12

# 成长质量策略
growth_quality:
  name: "成长质量"
  description: "营收和利润持续高增长且质量可持续"
  conditions:
    revenue_growth_min: 20
    profit_growth_min: 25
    roe_min: 15
  score_weight: 15

# 热点题材策略
hot_theme:
  name: "热点题材"
  description: "跟踪市场热点题材轮动，参与主线题材"
  conditions:
    theme_heat_rank: 3
    inflow_positive: true
  score_weight: 12

# 一阳穿三阴策略
one_yang_three_yin:
  name: "一阳穿三阴"
  description: "一根阳线收复前三根阴线的失地，强势反转"
  conditions:
    yang_covers_yin_count: 3
    volume_amplify: 1.5
  score_weight: 14

# 缩量回调策略
shrink_pullback:
  name: "缩量回调"
  description: "上涨趋势中的缩量回调，量能萎缩说明抛压不重"
  conditions:
    trend_up: true
    volume_shrink_ratio: 0.6
    pullback_days_max: 5
  score_weight: 16

# 放量突破策略
volume_breakout:
  name: "放量突破"
  description: "股价放量突破前期压力位/平台"
  conditions:
    breakout_resistance: true
    volume_ratio_min: 2.0
    close_above_resistance: true
  score_weight: 18

# 波浪理论策略
wave_theory:
  name: "波浪理论"
  description: "基于艾略特波浪理论判断当前浪型位置"
  conditions:
    wave_position: "wave3_start"
    fibonacci_support: true
  score_weight: 10
