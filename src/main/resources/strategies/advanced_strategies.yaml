# 龙头战法策略
name: dragon_head
label: 龙头战法
description: 识别板块龙头股首阴或缩量回调买入
category: hot_theme
risk_level: high
parameters:
  min_consec_up_days: 3
  pullback_pct: -3
entry_conditions:
  - type: consecutive_up
    days: 3
  - type: first_pullback
    max_pct: -5
exit_conditions:
  - type: break_below_ma
    ma: 5
  - type: stop_loss
    pct: -8
position_size: 50%
---
# 波浪理论策略
name: wave_theory
label: 波浪理论
description: 基于艾略特波浪理论判断浪型位置
category: pattern
risk_level: medium
parameters:
  wave_lookback: 60
entry_conditions:
  - type: wave_position
    target: wave_3_start
exit_conditions:
  - type: wave_position
    target: wave_5_end
  - type: stop_loss
    pct: -10
position_size: 70%
---
# 情绪周期策略
name: emotion_cycle
label: 情绪周期
description: 跟踪市场情绪周期高低点做反向操作
category: contrarian
risk_level: medium
parameters:
  sentiment_period: 20
  oversold_threshold: 20
  overbought_threshold: 80
entry_conditions:
  - type: sentiment_extreme
    level: oversold
exit_conditions:
  - type: sentiment_extreme
    level: overbought
  - type: stop_loss
    pct: -7
position_size: 60%
---
# 事件驱动策略
name: event_driven
label: 事件驱动
description: 基于重大事件(财报/政策/行业变化)驱动的交易
category: event
risk_level: high
parameters:
  event_types: [earnings, policy, industry]
  holding_days: 5
entry_conditions:
  - type: event_trigger
    category: positive
exit_conditions:
  - type: holding_days
    max: 5
  - type: stop_loss
    pct: -5
position_size: 50%
---
# 成长质量策略
name: growth_quality
label: 成长质量
description: 选择高成长+高质量的中长线标的
category: fundamental
risk_level: low
parameters:
  min_revenue_growth: 20
  min_roe: 15
  max_pe: 50
entry_conditions:
  - type: fundamental_filter
    revenue_growth_min: 20
    roe_min: 15
  - type: price_near_support
exit_conditions:
  - type: fundamental_deterioration
  - type: stop_loss
    pct: -15
position_size: 80%
