# 均线金叉策略
name: ma_golden_cross
label: 均线金叉
description: MA5上穿MA20形成金叉时买入，MA5下穿MA20死叉时卖出
category: trend_following
risk_level: medium

parameters:
  fast_period: 5
  slow_period: 20
  
entry_conditions:
  - type: ma_cross
    fast: MA5
    slow: MA20
    direction: golden  # 金叉

exit_conditions:
  - type: ma_cross
    fast: MA5
    slow: MA20
    direction: death   # 死叉
  - type: stop_loss
    pct: -8

position_size: 95%  # 仓位比例
