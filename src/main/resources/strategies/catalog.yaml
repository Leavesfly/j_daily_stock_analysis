# ──────────────────────────────────────────────────────────────
# 策略总目录（catalog）
#
# 加载顺序：本文件 → definitions/{category}/{id}.yaml
# 引擎对应关系：
#   backtest  → BacktestSignalEngine（历史 K 线回测）
#   screening → ScreeningScoreEngine（实时行情选股）
#   scoring   → CompositeScoringEngine（综合分析加权评分）
# ──────────────────────────────────────────────────────────────
schema_version: 1

# 能力说明
capabilities:
  backtest: 历史回测（入场/出场信号模拟）
  screening: 智能选股（AlphaSift 全市场打分筛选）
  scoring: 综合分析（多策略加权评分，CompositeScoringEngine）

# 策略分类（中文标签）
categories:
  technical: 技术面
  fundamental: 基本面
  sentiment: 情绪面
  event: 事件驱动

# runtime 状态说明：
#   implemented — 引擎已完整支持 YAML 中定义的条件
#   partial     — 部分条件类型尚未实现（如 wave_position、sentiment_extreme）
#   planned     — 仅配置定义，引擎尚未实现
strategies:
  # ── 回测策略 ──────────────────────────────────────────────
  ma_golden_cross:
    file: definitions/technical/ma_golden_cross.yaml
    capabilities: [backtest]
    runtime: implemented

  volume_breakout:
    file: definitions/technical/volume_breakout.yaml
    capabilities: [backtest, scoring]
    runtime: implemented

  bull_trend:
    file: definitions/technical/bull_trend.yaml
    capabilities: [backtest, scoring]
    runtime: implemented

  shrink_pullback:
    file: definitions/technical/shrink_pullback.yaml
    capabilities: [backtest, scoring]
    runtime: implemented

  box_oscillation:
    file: definitions/technical/box_oscillation.yaml
    capabilities: [backtest, scoring]
    runtime: implemented

  dragon_head:
    file: definitions/sentiment/dragon_head.yaml
    capabilities: [backtest, scoring]
    runtime: implemented

  wave_theory:
    file: definitions/technical/wave_theory.yaml
    capabilities: [backtest, scoring]
    runtime: implemented

  emotion_cycle:
    file: definitions/sentiment/emotion_cycle.yaml
    capabilities: [backtest, scoring]
    runtime: implemented

  event_driven:
    file: definitions/event/event_driven.yaml
    capabilities: [backtest, scoring]
    runtime: implemented

  growth_quality:
    file: definitions/fundamental/growth_quality.yaml
    capabilities: [backtest, scoring]
    runtime: implemented

  # ── 综合评分策略（scoring 段，CompositeScoringEngine）──
  bottom_volume:
    file: definitions/technical/bottom_volume.yaml
    capabilities: [scoring]
    runtime: implemented

  chan_theory:
    file: definitions/technical/chan_theory.yaml
    capabilities: [scoring]
    runtime: implemented

  expectation_repricing:
    file: definitions/fundamental/expectation_repricing.yaml
    capabilities: [scoring]
    runtime: implemented

  hot_theme:
    file: definitions/sentiment/hot_theme.yaml
    capabilities: [scoring]
    runtime: implemented

  one_yang_three_yin:
    file: definitions/technical/one_yang_three_yin.yaml
    capabilities: [scoring]
    runtime: implemented

  # ── 智能选股策略（screening 段）──────────────────────────
  dual_low:
    file: definitions/fundamental/dual_low.yaml
    capabilities: [screening]
    runtime: implemented

  value_growth:
    file: definitions/fundamental/value_growth.yaml
    capabilities: [screening]
    runtime: implemented

  momentum:
    file: definitions/technical/momentum.yaml
    capabilities: [screening]
    runtime: implemented

  dividend:
    file: definitions/fundamental/dividend.yaml
    capabilities: [screening]
    runtime: implemented
