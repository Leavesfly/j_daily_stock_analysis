# ──────────────────────────────────────────────────────────────
# 放量突破策略
# 引擎：backtest → BacktestSignalEngine | scoring → CompositeScoringEngine
# 逻辑：放量上涨突破时买入，大跌或止盈止损时卖出
# ──────────────────────────────────────────────────────────────
schema_version: 1
id: volume_breakout
label: 放量突破
description: 成交量超过 20 日均量 2 倍且涨幅 > 3% 时买入
category: momentum
risk_level: high
applicable_market: [bull, range]
applicable_cap: [mid, small]
tags: [突破, 放量, 动量, 短线]

backtest:
  parameters:
    volume_multiple: 2.0   # 成交量需超过均量的倍数
    min_change_pct: 3.0    # 最低涨幅要求（%）
    ma_period: 20          # 均量计算周期（日）

  # 参数搜索空间
  param_space:
    volume_multiple: [1.5, 2.0, 2.5, 3.0]
    min_change_pct: [2.0, 3.0, 4.0]

  entry_conditions:
    - type: volume_breakout
      multiple: 2.0
      min_change: 3.0

  exit_conditions:
    - type: change_below
      pct: -5              # 单日跌幅超过 5% 卖出
    - type: stop_loss
      pct: -10
    - type: take_profit
      pct: 15              # 盈利 15% 止盈

  position_size: 0.80

# 综合分析评分权重（待 ScoringEngine 接入）
scoring:
  score_weight: 18         # 在组合评分中的权重
  conditions:
    breakout_resistance: true       # 突破前期压力位
    volume_ratio_min: 2.0           # 量比下限
    close_above_resistance: true    # 收盘价站上压力位
