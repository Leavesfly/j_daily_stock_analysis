<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>策略回测 - 股票智能分析系统</title><link rel="stylesheet" th:href="@{/css/app.css}">
</head><body>
<div class="layout">
    <nav class="sidebar" th:replace="~{fragments/nav :: sidebar}"></nav>
    <main class="content">
        <header class="page-header"><h1>🔄 策略回测</h1></header>
        <section class="section">
            <form id="backtestForm" class="analysis-form" onsubmit="runBacktest(event)">
                <input type="text" id="btCode" placeholder="股票代码" class="input-lg" style="max-width:200px">
                <select id="btStrategy" class="input-lg" style="max-width:200px">
                    <option value="ma_golden_cross">均线金叉</option>
                    <option value="volume_breakout">放量突破</option>
                    <option value="bull_trend">牛趋势</option>
                    <option value="shrink_pullback">缩量回调</option>
                    <option value="box_oscillation">箱体震荡</option>
                </select>
                <input type="number" id="btDays" value="180" placeholder="回测天数" class="input-lg" style="max-width:120px">
                <button type="submit" class="btn btn-primary">开始回测</button>
            </form>
        </section>
        <section class="section" id="btResult" style="display:none">
            <h2>回测结果</h2>
            <div class="card-grid" id="btMetrics"></div>
        </section>
    </main>
</div>
<script th:src="@{/js/app.js}"></script>
<script>
async function runBacktest(e) {
    e.preventDefault();
    const code = document.getElementById('btCode').value;
    const strategy = document.getElementById('btStrategy').value;
    const days = document.getElementById('btDays').value;
    if (!code) { showToast('请输入股票代码'); return; }
    try {
        const data = await apiRequest('/backtest/run', {
            method: 'POST',
            body: JSON.stringify({stock_code: code, strategy: strategy, days: parseInt(days)})
        });
        document.getElementById('btResult').style.display = 'block';
        document.getElementById('btMetrics').innerHTML = `
            <div class="card"><h3>总收益</h3><p class="card-value ${data.totalReturnPct>=0?'positive':'negative'}">${data.totalReturnPct?.toFixed(2)}%</p></div>
            <div class="card"><h3>最大回撤</h3><p class="card-value">${data.maxDrawdownPct?.toFixed(2)}%</p></div>
            <div class="card"><h3>胜率</h3><p class="card-value">${data.winRatePct?.toFixed(1)}%</p></div>
            <div class="card"><h3>夏普比率</h3><p class="card-value">${data.sharpeRatio?.toFixed(2)}</p></div>
            <div class="card"><h3>交易次数</h3><p class="card-value">${data.totalTrades}</p></div>
            <div class="card"><h3>年化收益</h3><p class="card-value">${data.annualReturnPct?.toFixed(2)}%</p></div>
        `;
    } catch(err) { showToast('回测失败: ' + err.message, 'error'); }
}
</script>
</body></html>
