<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>回测分析 - 股票智能分析系统</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
</head>
<body>
<div class="layout">
    <nav class="sidebar" th:replace="~{fragments/nav :: sidebar}"></nav>
    <main class="content">
        <header class="page-header"><h1>回测分析</h1>
            <div class="actions"><button class="btn btn-sm btn-primary" onclick="runBacktest()">▶ 运行回测</button></div>
        </header>

        <!-- 绩效概览 -->
        <div class="card-grid" id="perfCards">
            <div class="card"><h3 data-i18n="backtest.winRate">总胜率</h3><p class="card-value" id="perfWinRate">--</p></div>
            <div class="card"><h3 data-i18n="backtest.totalSignals">总信号数</h3><p class="card-value" id="perfTotal">--</p></div>
            <div class="card"><h3 data-i18n="backtest.plRatio">盈亏比</h3><p class="card-value" id="perfPLRatio">--</p></div>
            <div class="card"><h3 data-i18n="backtest.avgReturn">平均收益</h3><p class="card-value" id="perfAvgReturn">--</p></div>
        </div>

        <!-- 回测绩效图表 -->
        <div class="card mb-4">
            <div class="chart-container"><canvas id="btPerfChart"></canvas></div>
        </div>

        <!-- 筛选 -->
        <div class="filter-bar">
            <input type="text" class="form-input" id="btFilterCode" placeholder="股票代码" style="width:120px;">
            <select class="form-select" id="btFilterPhase">
                <option value="">全部阶段</option><option value="premarket">盘前</option><option value="intraday">盘中</option><option value="postmarket">盘后</option>
            </select>
            <input type="date" class="form-input" id="btFilterFrom" style="width:140px;">
            <input type="date" class="form-input" id="btFilterTo" style="width:140px;">
            <button class="btn btn-sm btn-secondary" onclick="loadResults()">筛选</button>
        </div>

        <!-- 结果表格 -->
        <div class="table-wrapper">
            <table class="data-table">
                <thead><tr><th>股票</th><th>动作</th><th>阶段</th><th>方向</th><th>实际</th><th>结果</th><th>收益%</th><th>分析日期</th></tr></thead>
                <tbody id="btResultsBody"><tr><td colspan="8" class="empty">加载中...</td></tr></tbody>
            </table>
        </div>
        <div id="btPagination"></div>
    </main>
</div>
<script th:src="@{/js/app.js}"></script>
<script>
let btPage = 1;
const OUTCOME_LABELS = {win:'盈利',loss:'亏损',neutral:'持平'};
const MOVEMENT_LABELS = {up:'上涨',down:'下跌',flat:'横盘'};

async function loadPerformance() {
    try {
        const data = await api.get('/backtest/performance');
        if (data) {
            document.getElementById('perfWinRate').textContent = data.win_rate != null ? formatPct(data.win_rate) : '--';
            document.getElementById('perfTotal').textContent = data.total || '--';
            document.getElementById('perfPLRatio').textContent = data.profit_loss_ratio != null ? formatNumber(data.profit_loss_ratio) : '--';
            document.getElementById('perfAvgReturn').textContent = data.avg_return_pct != null ? formatPct(data.avg_return_pct) : '--';
            // 绘制绩效图表
            if (typeof Chart !== 'undefined' && data.total > 0) {
                const winCount = Math.round((data.win_rate || 0) / 100 * (data.total || 0));
                const lossCount = (data.total || 0) - winCount;
                createPieChart('btPerfChart', ['盈利', '亏损'], [winCount, lossCount], '信号胜负分布');
            }
        }
    } catch(e) {}
}

async function loadResults() {
    const params = { page: btPage, limit: 20 };
    const code = document.getElementById('btFilterCode').value;
    const phase = document.getElementById('btFilterPhase').value;
    const from = document.getElementById('btFilterFrom').value;
    const to = document.getElementById('btFilterTo').value;
    if (code) params.code = code;
    if (phase) params.analysis_phase = phase;
    if (from) params.analysis_date_from = from;
    if (to) params.analysis_date_to = to;

    try {
        const data = await api.get('/backtest/results', params);
        const items = data.items || [];
        document.getElementById('btResultsBody').innerHTML = items.length === 0 ? '<tr><td colspan="8" class="empty">暂无回测结果</td></tr>' :
            items.map(r => `<tr>
                <td><strong>${r.stock_code}</strong><br><span class="text-sm text-muted">${r.stock_name||''}</span></td>
                <td><span class="badge badge-primary">${r.action||'--'}</span></td>
                <td>${r.market_phase||'--'}</td>
                <td>${r.direction_expected||'--'}</td>
                <td><span class="badge ${r.actual_movement==='up'?'badge-danger':r.actual_movement==='down'?'badge-success':'badge-default'}">${MOVEMENT_LABELS[r.actual_movement]||r.actual_movement||'--'}</span></td>
                <td><span class="badge ${r.outcome==='win'?'badge-success':r.outcome==='loss'?'badge-danger':'badge-default'}">${OUTCOME_LABELS[r.outcome]||r.outcome||'--'}</span></td>
                <td class="${(r.return_pct||0)>=0?'text-danger':'text-success'}">${r.return_pct!=null?formatPct(r.return_pct):'--'}</td>
                <td>${r.analysis_date?r.analysis_date.slice(0,10):'--'}</td>
            </tr>`).join('');
        renderPagination(document.getElementById('btPagination'), { page: data.page||1, total: data.total||0, pageSize: 20, onChange: p => { btPage=p; loadResults(); } });
    } catch(e) { document.getElementById('btResultsBody').innerHTML = '<tr><td colspan="8" class="empty">加载失败</td></tr>'; }
}

async function runBacktest() {
    try { const data = await api.post('/backtest/run', {}); showToast(`回测完成，评估了 ${data.evaluated||0} 个信号`, 'success'); loadPerformance(); loadResults(); } catch(e) { showToast(e.message||'运行失败','error'); }
}

loadPerformance();
loadResults();
</script>
</body>
</html>
