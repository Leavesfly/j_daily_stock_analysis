<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>投资组合 - 股票智能分析系统</title><link rel="stylesheet" th:href="@{/css/app.css}">
</head><body>
<div class="layout">
    <nav class="sidebar" th:replace="~{fragments/nav :: sidebar}"></nav>
    <main class="content">
        <header class="page-header"><h1>💼 投资组合</h1></header>
        <div class="card-grid">
            <div class="card"><h3>总市值</h3><p class="card-value" th:text="${summary['total_market_value']}">0</p></div>
            <div class="card"><h3>总盈亏</h3><p class="card-value" th:classappend="${summary['total_profit_loss'] >= 0} ? 'positive' : 'negative'" th:text="${summary['total_profit_loss']}">0</p></div>
            <div class="card"><h3>持仓数</h3><p class="card-value" th:text="${summary['total_positions']}">0</p></div>
            <div class="card"><h3>胜率</h3><p class="card-value" th:text="${summary['win_rate_pct']} + '%'">0%</p></div>
        </div>
        <section class="section">
            <h2>持仓列表</h2>
            <table class="data-table">
                <thead><tr><th>股票</th><th>数量</th><th>成本</th><th>现价</th><th>盈亏</th><th>盈亏%</th><th>占比</th></tr></thead>
                <tbody>
                <tr th:each="p : ${positions}">
                    <td th:text="${p.stockName} + '(' + ${p.stockCode} + ')'">-</td>
                    <td th:text="${p.quantity}">-</td>
                    <td th:text="${p.costPrice}">-</td>
                    <td th:text="${p.currentPrice}">-</td>
                    <td th:classappend="${p.profitLoss >= 0} ? 'positive' : 'negative'" th:text="${p.profitLoss}">-</td>
                    <td th:classappend="${p.profitLossPct >= 0} ? 'positive' : 'negative'" th:text="${p.profitLossPct} + '%'">-</td>
                    <td th:text="${p.positionPct} + '%'">-</td>
                </tr>
                <tr th:if="${#lists.isEmpty(positions)}"><td colspan="7" class="empty">暂无持仓</td></tr>
                </tbody>
            </table>
        </section>
        <section class="section"><h2>风险评估</h2>
            <div class="card"><p>集中度风险: <strong th:text="${risk['concentration_risk']}">-</strong> | 深亏持仓: <strong th:text="${risk['deep_loss_count']}">0</strong></p></div>
        </section>
    </main>
</div></body></html>
