<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${pageTitle} + ' - 股票智能分析系统'">股票智能分析系统</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<!-- 侧边导航 -->
<div class="layout">
    <nav class="sidebar">
        <div class="logo">📊 DSA</div>
        <ul class="nav-list">
            <li><a th:classappend="${pageTitle == '仪表盘'} ? 'active'" th:href="@{/web/dashboard}">🏠 仪表盘</a></li>
            <li><a th:classappend="${pageTitle == '股票分析'} ? 'active'" th:href="@{/web/analysis}">📈 股票分析</a></li>
            <li><a th:classappend="${pageTitle == '投资组合'} ? 'active'" th:href="@{/web/portfolio}">💼 投资组合</a></li>
            <li><a th:classappend="${pageTitle == '告警管理'} ? 'active'" th:href="@{/web/alerts}">⚠️ 告警管理</a></li>
            <li><a th:classappend="${pageTitle == '策略回测'} ? 'active'" th:href="@{/web/backtest}">🔄 策略回测</a></li>
            <li><a th:classappend="${pageTitle == 'AI问股'} ? 'active'" th:href="@{/web/chat}">🤖 AI问股</a></li>
            <li><a th:classappend="${pageTitle == '分析历史'} ? 'active'" th:href="@{/web/history}">📋 分析历史</a></li>
            <li><a th:classappend="${pageTitle == '系统设置'} ? 'active'" th:href="@{/web/settings}">⚙️ 系统设置</a></li>
        </ul>
    </nav>
    <main class="content">
        <header class="page-header">
            <h1 th:text="${pageTitle}">页面标题</h1>
            <span class="trading-badge" th:classappend="${isTradingTime} ? 'trading' : 'closed'"
                  th:text="${isTradingTime} ? '交易中' : '已休市'">状态</span>
        </header>
        <div th:replace="~{'fragments/' + ${#strings.toLowerCase(pageTitle)} + ' :: content'}">
            <!-- 页面内容由fragment填充 -->
        </div>
    </main>
</div>
<script th:src="@{/js/app.js}"></script>
</body>
</html>
