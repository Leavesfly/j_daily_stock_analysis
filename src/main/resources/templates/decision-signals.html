<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>决策信号 - 股票智能分析系统</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<div class="layout">
    <nav class="sidebar" th:replace="~{fragments/nav :: sidebar}"></nav>
    <main class="content">
        <header class="page-header"><h1>决策信号</h1>
            <div class="actions"><button class="btn btn-sm btn-secondary" onclick="loadSignals()">🔄 刷新</button></div>
        </header>

        <!-- 筛选栏 -->
        <div class="filter-bar">
            <select class="form-select" id="filterMarket" onchange="loadSignals()"><option value="">全部市场</option><option value="cn">A股</option><option value="hk">港股</option><option value="us">美股</option></select>
            <input type="text" class="form-input" id="filterStock" placeholder="股票代码" style="width:120px;">
            <select class="form-select" id="filterAction" onchange="loadSignals()"><option value="">全部动作</option><option value="buy">买入</option><option value="hold">持有</option><option value="sell">卖出</option><option value="watch">观望</option><option value="avoid">回避</option></select>
            <select class="form-select" id="filterStatus" onchange="loadSignals()"><option value="">全部状态</option><option value="active">活跃</option><option value="expired">已过期</option><option value="closed">已关闭</option><option value="invalidated">已失效</option></select>
            <select class="form-select" id="filterSource" onchange="loadSignals()"><option value="">全部来源</option><option value="analysis">分析</option><option value="agent">Agent</option><option value="alert">告警</option><option value="manual">手动</option></select>
            <button class="btn btn-sm btn-primary" onclick="loadSignals()">搜索</button>
        </div>

        <!-- 信号列表 -->
        <div id="signalsList"></div>
        <div id="signalsPagination"></div>

        <!-- 统计面板 -->
        <section class="section mt-4">
            <h2 class="mb-3">信号统计</h2>
            <div class="card-grid" id="signalStats"></div>
        </section>
    </main>
</div>
<script th:src="@{/js/app.js}"></script>
<script>
let signalPage = 1;
const ACTION_LABELS = {buy:'买入',add:'加仓',hold:'持有',reduce:'减仓',sell:'卖出',watch:'观望',avoid:'回避',alert:'提醒'};
const STATUS_LABELS = {active:'活跃',expired:'已过期',invalidated:'已失效',closed:'已关闭',archived:'已归档'};

async function loadSignals() {
    const params = { page: signalPage, page_size: 20 };
    const market = document.getElementById('filterMarket').value;
    const stock = document.getElementById('filterStock').value;
    const action = document.getElementById('filterAction').value;
    const status = document.getElementById('filterStatus').value;
    const source = document.getElementById('filterSource').value;
    if (market) params.market = market;
    if (stock) params.stock_code = stock;
    if (action) params.action = action;
    if (status) params.status = status;
    if (source) params.source_type = source;

    try {
        const data = await api.get('/decision-signals', params);
        const items = data.items || [];
        const container = document.getElementById('signalsList');
        if (items.length === 0) { container.innerHTML = '<div class="empty-state"><p>暂无决策信号</p></div>'; return; }
        container.innerHTML = items.map(s => `
            <div class="report-card" onclick="openSignalDetail(${s.id})">
                <div class="report-header">
                    <div><strong>${s.stock_name||''}(${s.stock_code})</strong>
                        <span class="badge badge-${s.action==='buy'||s.action==='add'?'danger':s.action==='sell'||s.action==='reduce'?'success':'default'}" style="margin-left:8px;">${ACTION_LABELS[s.action]||s.action}</span>
                        <span class="badge badge-${s.status==='active'?'info':'default'}" style="margin-left:4px;">${STATUS_LABELS[s.status]||s.status}</span>
                    </div>
                    <span class="text-sm text-muted">${formatDateShort(s.created_at)}</span>
                </div>
                <div class="report-metrics">
                    ${s.confidence!=null?`<div class="metric"><label>置信度</label><span>${(s.confidence*100).toFixed(0)}%</span></div>`:''}
                    ${s.score!=null?`<div class="metric"><label>评分</label><span>${s.score}</span></div>`:''}
                    ${s.target_price!=null?`<div class="metric"><label>目标价</label><span>${formatNumber(s.target_price)}</span></div>`:''}
                    ${s.stop_loss!=null?`<div class="metric"><label>止损</label><span>${formatNumber(s.stop_loss)}</span></div>`:''}
                </div>
                ${s.reason?`<p class="text-sm text-muted truncate">${s.reason}</p>`:''}
            </div>
        `).join('');
        renderPagination(document.getElementById('signalsPagination'), { page: data.page||1, total: data.total||0, pageSize: 20, onChange: p => { signalPage=p; loadSignals(); } });
    } catch(e) { document.getElementById('signalsList').innerHTML = '<div class="empty-state"><p>加载失败</p></div>'; }
}

async function openSignalDetail(id) {
    try {
        const signal = await api.get(`/decision-signals/${id}`);
        const outcomes = await api.get(`/decision-signals/${id}/outcomes`).catch(() => ({items:[]}));
        const feedback = await api.get(`/decision-signals/${id}/feedback`).catch(() => ({}));
        openDrawer(`信号详情 - ${signal.stock_code}`, (body) => {
            body.innerHTML = `
                <div class="mb-3"><strong>${signal.stock_name||''}(${signal.stock_code})</strong>
                    <span class="badge badge-info" style="margin-left:8px;">${signal.market||''}</span></div>
                <div class="card-grid" style="grid-template-columns:1fr 1fr;">
                    <div><span class="text-sm text-muted">动作</span><br><span class="badge badge-primary">${ACTION_LABELS[signal.action]||signal.action}</span></div>
                    <div><span class="text-sm text-muted">状态</span><br><span class="badge badge-info">${STATUS_LABELS[signal.status]||signal.status}</span></div>
                    <div><span class="text-sm text-muted">置信度</span><br><strong>${signal.confidence!=null?(signal.confidence*100).toFixed(0)+'%':'--'}</strong></div>
                    <div><span class="text-sm text-muted">评分</span><br><strong>${signal.score!=null?signal.score:'--'}</strong></div>
                    <div><span class="text-sm text-muted">来源</span><br>${signal.source_type||'--'}</div>
                    <div><span class="text-sm text-muted">周期</span><br>${signal.horizon||'--'}</div>
                    ${signal.entry_low!=null?`<div><span class="text-sm text-muted">建仓区间</span><br>${formatNumber(signal.entry_low)}-${formatNumber(signal.entry_high)}</div>`:''}
                    ${signal.stop_loss!=null?`<div><span class="text-sm text-muted">止损</span><br>${formatNumber(signal.stop_loss)}</div>`:''}
                    ${signal.target_price!=null?`<div><span class="text-sm text-muted">目标价</span><br>${formatNumber(signal.target_price)}</div>`:''}
                </div>
                <div class="mt-4"><h4 class="mb-2">分析理由</h4><p class="text-sm">${signal.reason||'无'}</p></div>
                ${signal.risk_summary?`<div class="mt-4"><h4 class="mb-2">风险摘要</h4><p class="text-sm">${signal.risk_summary}</p></div>`:''}
                ${signal.catalyst_summary?`<div class="mt-4"><h4 class="mb-2">催化剂</h4><p class="text-sm">${signal.catalyst_summary}</p></div>`:''}
                ${signal.watch_conditions?`<div class="mt-4"><h4 class="mb-2">观察条件</h4><p class="text-sm">${signal.watch_conditions}</p></div>`:''}
                ${renderOutcomes(outcomes.items||[])}
                ${renderFeedback(id, feedback)}
                <div class="mt-4 btn-group">
                    <button class="btn btn-sm btn-secondary" onclick="updateSignalStatus(${id},'closed')">关闭</button>
                    <button class="btn btn-sm btn-secondary" onclick="updateSignalStatus(${id},'invalidated')">失效</button>
                    <button class="btn btn-sm btn-secondary" onclick="updateSignalStatus(${id},'archived')">归档</button>
                </div>`;
        });
    } catch(e) { showToast('加载失败','error'); }
}

function renderOutcomes(items) {
    if (items.length === 0) return '';
    return `<div class="mt-4"><h4 class="mb-2">结果评估</h4>
        <div class="table-wrapper"><table class="data-table">
            <thead><tr><th>周期</th><th>结果</th><th>回报(%)</th><th>状态</th><th>评估时间</th></tr></thead>
            <tbody>${items.map(o => `<tr>
                <td>${o.horizon||'--'}</td>
                <td><span class="badge ${o.outcome==='win'?'badge-success':o.outcome==='loss'?'badge-danger':'badge-default'}">${o.outcome||'--'}</span></td>
                <td>${o.return_pct!=null?formatNumber(o.return_pct)+'%':'--'}</td>
                <td>${o.eval_status||'--'}</td>
                <td>${o.evaluated_at?formatDateShort(o.evaluated_at):'--'}</td>
            </tr>`).join('')}</tbody>
        </table></div></div>`;
}

function renderFeedback(signalId, fb) {
    const val = fb.feedback_value || '';
    return `<div class="mt-4"><h4 class="mb-2">我的反馈</h4>
        <div class="btn-group">
            <button class="btn btn-sm ${val==='agree'?'btn-primary':'btn-secondary'}" onclick="submitFeedback(${signalId},'agree')">👍 认同</button>
            <button class="btn btn-sm ${val==='disagree'?'btn-primary':'btn-secondary'}" onclick="submitFeedback(${signalId},'disagree')">👎 不认同</button>
            <button class="btn btn-sm ${val==='partial'?'btn-primary':'btn-secondary'}" onclick="submitFeedback(${signalId},'partial')">🤔 部分认同</button>
        </div>
        ${fb.note?`<p class="text-sm text-muted mt-2">备注: ${fb.note}</p>`:''}
    </div>`;
}

async function submitFeedback(signalId, value) {
    try {
        await api.put(`/decision-signals/${signalId}/feedback`, { feedback_value: value, source: 'web' });
        showToast('反馈已保存','success');
        openSignalDetail(signalId); // 刷新详情
    } catch(e) { showToast(e.message,'error'); }
}

async function updateSignalStatus(id, status) {
    if (!await confirmDialog(`确认将信号状态改为 ${STATUS_LABELS[status]}？`)) return;
    try { await api.patch(`/decision-signals/${id}/status`, { status }); closeDrawer(); loadSignals(); showToast('状态已更新','success'); } catch(e) { showToast(e.message,'error'); }
}

async function loadStats() {
    try {
        const data = await api.get('/decision-signals/outcomes/stats');
        document.getElementById('signalStats').innerHTML = `
            <div class="card"><h3>总信号数</h3><p class="card-value">${data.total||0}</p></div>
            <div class="card"><h3>胜率</h3><p class="card-value">${data.win_rate!=null?formatPct(data.win_rate):'--'}</p></div>
            <div class="card"><h3>盈利信号</h3><p class="card-value text-danger">${data.win_count||0}</p></div>
            <div class="card"><h3>亏损信号</h3><p class="card-value text-success">${data.loss_count||0}</p></div>`;
    } catch(e) {}
}

loadSignals();
loadStats();
</script>
</body>
</html>
