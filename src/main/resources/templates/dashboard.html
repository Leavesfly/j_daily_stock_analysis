<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>仪表盘 - 股票智能分析系统</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<div class="layout">
    <nav class="sidebar" th:replace="~{fragments/nav :: sidebar}"></nav>
    <main class="content">
        <header class="page-header">
            <h1>仪表盘</h1>
            <div class="actions">
                <span class="trading-badge" th:classappend="${isTradingTime} ? 'trading' : 'closed'"
                      th:text="${isTradingTime} ? '🟢 交易中' : '🔴 已休市'">状态</span>
            </div>
        </header>

        <!-- 股票分析搜索 -->
        <section class="section">
            <div class="card">
                <div class="form-inline">
                    <div class="autocomplete-wrapper" style="flex:1;max-width:500px;">
                        <input type="text" id="stockInput" class="form-input form-input-lg" 
                               placeholder="输入股票代码或名称，如: 600519, 茅台, AAPL" autocomplete="off">
                        <div id="autocompleteList" class="autocomplete-list"></div>
                    </div>
                    <select id="skillSelect" class="form-select" style="width:160px;">
                        <option value="">默认分析</option>
                        <option value="chan_theory">缠论</option>
                        <option value="wave_theory">波浪理论</option>
                        <option value="bull_trend">牛趋势</option>
                        <option value="emotion_cycle">情绪周期</option>
                        <option value="box_oscillation">箱体震荡</option>
                    </select>
                    <button class="btn btn-primary" onclick="startAnalysis()">开始分析</button>
                    <button class="btn btn-secondary" onclick="triggerMarketReview()">大盘复盘</button>
                </div>
                <p class="form-hint mt-2">支持A股(6位代码)、港股(hk开头)、美股(英文代码)</p>
            </div>
        </section>

        <!-- 概览卡片 -->
        <div class="card-grid">
            <div class="card">
                <h3>市场情绪</h3>
                <p class="card-value" th:text="${marketContext != null ? marketContext['market_sentiment'] : '中性'}">中性</p>
            </div>
            <div class="card">
                <h3>持仓数量</h3>
                <p class="card-value" th:text="${portfolioSummary != null ? portfolioSummary['total_positions'] : 0}">0</p>
            </div>
            <div class="card">
                <h3>活跃告警</h3>
                <p class="card-value" th:text="${activeAlerts}">0</p>
            </div>
            <div class="card">
                <h3>总盈亏</h3>
                <p class="card-value" th:classappend="${portfolioSummary != null and portfolioSummary['total_profit_loss'] != null and portfolioSummary['total_profit_loss'] >= 0} ? 'positive' : 'negative'"
                   th:text="${portfolioSummary != null and portfolioSummary['total_profit_loss'] != null} ? ${#numbers.formatDecimal(portfolioSummary['total_profit_loss'], 1, 2)} : '0.00'">0.00</p>
            </div>
        </div>

        <!-- 自选股 -->
        <section class="section">
            <div class="section-header">
                <h2>自选股</h2>
                <button class="btn btn-sm btn-secondary" onclick="refreshWatchlist()">刷新</button>
            </div>
            <div id="watchlistContainer" class="card">
                <div class="loading"><div class="spinner"></div>加载中...</div>
            </div>
        </section>

        <!-- 任务列表 -->
        <section class="section">
            <div class="section-header">
                <h2>分析任务</h2>
            </div>
            <div id="taskListContainer"></div>
        </section>

        <!-- 最近分析 -->
        <section class="section">
            <div class="section-header">
                <h2>最近分析</h2>
                <a href="/web/history" class="btn btn-sm btn-ghost">查看全部</a>
            </div>
            <div class="table-wrapper">
                <table class="data-table">
                    <thead>
                    <tr><th>股票</th><th>信号</th><th>评分</th><th>价格</th><th>涨跌</th><th>时间</th></tr>
                    </thead>
                    <tbody>
                    <tr th:each="report : ${recentReports}">
                        <td>
                            <a th:href="@{/web/analysis(code=${report.stockCode})}"
                               th:text="${report.stockName} + '(' + ${report.stockCode} + ')'">股票</a>
                        </td>
                        <td><span class="signal-badge" th:classappend="${report.signal}" th:text="${report.signal}">-</span></td>
                        <td th:text="${report.totalScore}">-</td>
                        <td th:text="${report.currentPrice != null} ? ${#numbers.formatDecimal(report.currentPrice, 1, 2)} : '-'">-</td>
                        <td th:classappend="${report.changePct != null and report.changePct >= 0} ? 'text-danger' : 'text-success'"
                            th:text="${report.changePct != null} ? ${#numbers.formatDecimal(report.changePct, 1, 2)} + '%' : '-'">-</td>
                        <td th:text="${report.analysisDate != null} ? ${#temporals.format(report.analysisDate, 'MM-dd HH:mm')} : '-'">-</td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(recentReports)}"><td colspan="6" class="empty">暂无分析记录</td></tr>
                    </tbody>
                </table>
            </div>
        </section>
    </main>
</div>
<script th:src="@{/js/app.js}"></script>
<script>
// 股票自动补全
let acTimer = null;
const stockInput = document.getElementById('stockInput');
const acList = document.getElementById('autocompleteList');

stockInput.addEventListener('input', () => {
    clearTimeout(acTimer);
    const q = stockInput.value.trim();
    if (q.length < 1) { acList.classList.remove('show'); return; }
    acTimer = setTimeout(async () => {
        try {
            const data = await api.get('/stocks/autocomplete', { q });
            if (data && data.length > 0) {
                acList.innerHTML = data.map(s => 
                    `<div class="autocomplete-item" onclick="selectStock('${s.code}','${s.name}')">
                        <span class="code">${s.code}</span><span class="name">${s.name || ''}</span>
                    </div>`
                ).join('');
                acList.classList.add('show');
            } else { acList.classList.remove('show'); }
        } catch(e) { acList.classList.remove('show'); }
    }, 300);
});
stockInput.addEventListener('blur', () => setTimeout(() => acList.classList.remove('show'), 200));
function selectStock(code, name) {
    stockInput.value = code;
    acList.classList.remove('show');
}

// 开始分析
async function startAnalysis() {
    const code = stockInput.value.trim();
    if (!code) { showToast('请输入股票代码', 'warning'); return; }
    const skill = document.getElementById('skillSelect').value;
    try {
        const body = { stock_code: code, async_mode: true };
        if (skill) body.skills = [skill];
        await api.post('/analysis/analyze', body);
        showToast('分析任务已提交: ' + code, 'success');
        stockInput.value = '';
        loadTasks();
    } catch(e) { showToast(e.message || '提交失败', 'error'); }
}

// 大盘复盘
async function triggerMarketReview() {
    try {
        await api.post('/analysis/market-review', {});
        showToast('大盘复盘已触发', 'success');
    } catch(e) { showToast(e.message || '触发失败', 'error'); }
}

// 自选股
async function refreshWatchlist() {
    const container = document.getElementById('watchlistContainer');
    try {
        const data = await api.get('/stocks/watchlist');
        const codes = data.stock_codes || data.stockCodes || [];
        if (codes.length === 0) {
            container.innerHTML = '<div class="empty-state"><p>暂无自选股，在搜索框输入代码后可添加</p></div>';
        } else {
            container.innerHTML = '<div class="skill-tags">' + codes.map(c => 
                `<span class="skill-tag" onclick="selectStock('${c}','')">${c}</span>`
            ).join('') + '</div>';
        }
    } catch(e) { container.innerHTML = '<div class="text-muted text-sm">加载失败</div>'; }
}

// 任务列表
async function loadTasks() {
    const container = document.getElementById('taskListContainer');
    try {
        const data = await api.get('/analysis/tasks', { limit: 5 });
        const tasks = data.tasks || [];
        if (tasks.length === 0) { container.innerHTML = ''; return; }
        container.innerHTML = '<div class="card">' + tasks.map(t => `
            <div class="flex items-center justify-between mb-2" style="padding:8px 0;border-bottom:1px solid var(--border);">
                <div><span class="font-bold">${t.stock_code || t.stockCode || '大盘复盘'}</span>
                <span class="badge badge-${t.status === 'completed' ? 'success' : t.status === 'failed' ? 'danger' : 'info'}">${t.status}</span></div>
                <span class="text-sm text-muted">${formatDateShort(t.created_at || t.createdAt)}</span>
            </div>`).join('') + '</div>';
    } catch(e) { /* ignore */ }
}

// 初始化
refreshWatchlist();
loadTasks();
</script>
</body>
</html>

                <a th:href="@{/web/chat}" class="btn btn-secondary">🤖 AI问股</a>
                <a th:href="@{/web/backtest}" class="btn btn-secondary">🔄 策略回测</a>

</div>
<script th:src="@{/js/app.js}"></script>
