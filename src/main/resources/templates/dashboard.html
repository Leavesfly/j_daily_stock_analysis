<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${pageTitle} + ' - 股票智能分析系统'">仪表盘</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<div class="layout">
    <nav class="sidebar" th:replace="~{fragments/nav :: sidebar}"></nav>
    <main class="content">
        <header class="page-header">
            <h1>📊 仪表盘</h1>
            <span class="trading-badge" th:classappend="${isTradingTime} ? 'trading' : 'closed'"
                  th:text="${isTradingTime} ? '🟢 交易中' : '🔴 已休市'">状态</span>
        </header>

        <!-- 概览卡片 -->
        <div class="card-grid">
            <div class="card">
                <h3>市场情绪</h3>
                <p class="card-value" th:text="${marketContext['market_sentiment']}">中性</p>
            </div>
            <div class="card">
                <h3>持仓数量</h3>
                <p class="card-value" th:text="${portfolioSummary['total_positions']}">0</p>
            </div>
            <div class="card">
                <h3>活跃告警</h3>
                <p class="card-value" th:text="${activeAlerts}">0</p>
            </div>
            <div class="card">
                <h3>总盈亏</h3>
                <p class="card-value" th:classappend="${portfolioSummary['total_profit_loss'] != null and portfolioSummary['total_profit_loss'] >= 0} ? 'positive' : 'negative'"
                   th:text="${portfolioSummary['total_profit_loss'] != null} ? ${#numbers.formatDecimal(portfolioSummary['total_profit_loss'], 1, 2)} : '0.00'">0.00</p>
            </div>
        </div>

        <!-- 最近分析结果 -->
        <section class="section">
            <h2>最近分析</h2>
            <div class="table-wrapper">
                <table class="data-table">
                    <thead>
                    <tr><th>股票</th><th>信号</th><th>评分</th><th>价格</th><th>涨跌</th><th>时间</th></tr>
                    </thead>
                    <tbody>
                    <tr th:each="report : ${recentReports}">
                        <td>
                            <a th:href="@{/web/analysis(code=${report.stockCode})}"
                               th:text="${report.stockName} + '(' + ${report.stockCode} + ')'">股票</a>
                        </td>
                        <td><span class="signal-badge" th:classappend="${report.signal}" th:text="${report.signal}">-</span></td>
                        <td th:text="${report.totalScore}">-</td>
                        <td th:text="${report.currentPrice != null} ? ${#numbers.formatDecimal(report.currentPrice, 1, 2)} : '-'">-</td>
                        <td th:classappend="${report.changePct != null and report.changePct >= 0} ? 'positive' : 'negative'"
                            th:text="${report.changePct != null} ? ${#numbers.formatDecimal(report.changePct, 1, 2)} + '%' : '-'">-</td>
                        <td th:text="${#temporals.format(report.analysisDate, 'MM-dd HH:mm')}">-</td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(recentReports)}"><td colspan="6" class="empty">暂无分析记录</td></tr>
                    </tbody>
                </table>
            </div>
        </section>

        <!-- 快捷操作 -->
        <section class="section">
            <h2>快捷操作</h2>
            <div class="action-bar">
                <a th:href="@{/web/analysis}" class="btn btn-primary">📈 开始分析</a>
                <a th:href="@{/web/chat}" class="btn btn-secondary">🤖 AI问股</a>
                <a th:href="@{/web/backtest}" class="btn btn-secondary">🔄 策略回测</a>
            </div>
        </section>
    </main>
</div>
<script th:src="@{/js/app.js}"></script>
</body>
</html>
