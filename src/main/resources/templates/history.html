<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>分析历史 - 股票智能分析系统</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<div class="layout">
    <nav class="sidebar" th:replace="~{fragments/nav :: sidebar}"></nav>
    <main class="content">
        <header class="page-header"><h1>分析历史</h1></header>

        <div class="filter-bar">
            <input type="text" class="form-input" id="histFilterCode" placeholder="股票代码" style="width:140px;">
            <input type="date" class="form-input" id="histFilterFrom" style="width:140px;">
            <input type="date" class="form-input" id="histFilterTo" style="width:140px;">
            <button class="btn btn-sm btn-primary" onclick="loadHistory()">搜索</button>
        </div>

        <div class="table-wrapper">
            <table class="data-table">
                <thead><tr><th>股票</th><th>信号</th><th>评分</th><th>价格</th><th>涨跌</th><th>模型</th><th>时间</th><th>操作</th></tr></thead>
                <tbody id="historyBody"><tr><td colspan="8" class="empty">加载中...</td></tr></tbody>
            </table>
        </div>
        <div id="histPagination"></div>
    </main>
</div>
<script th:src="@{/js/app.js}"></script>
<script>
let histPage = 1;
async function loadHistory() {
    const params = { page: histPage, limit: 20 };
    const code = document.getElementById('histFilterCode').value;
    const from = document.getElementById('histFilterFrom').value;
    const to = document.getElementById('histFilterTo').value;
    if (code) params.stock_code = code;
    if (from) params.date_from = from;
    if (to) params.date_to = to;

    try {
        const data = await api.get('/history', params);
        const items = data.items || data || [];
        document.getElementById('historyBody').innerHTML = items.length === 0 ? '<tr><td colspan="8" class="empty">暂无分析记录</td></tr>' :
            items.map(r => `<tr>
                <td><a href="/web/analysis?code=${r.stock_code}">${r.stock_name||''}(${r.stock_code})</a></td>
                <td><span class="signal-badge ${r.signal}">${r.signal||'--'}</span></td>
                <td>${r.total_score||'--'}</td>
                <td>${formatNumber(r.current_price)}</td>
                <td class="${(r.change_pct||0)>=0?'text-danger':'text-success'}">${formatPct(r.change_pct)}</td>
                <td class="text-sm">${r.llm_model||'--'}</td>
                <td>${formatDateShort(r.analysis_date||r.created_at)}</td>
                <td><button class="btn btn-sm btn-ghost" onclick="viewReport(${r.id})">查看</button>
                    <button class="btn btn-sm btn-ghost" onclick="deleteReport(${r.id})">删除</button></td>
            </tr>`).join('');
        renderPagination(document.getElementById('histPagination'), { page: data.page||histPage, total: data.total||items.length, pageSize: 20, onChange: p => { histPage=p; loadHistory(); } });
    } catch(e) {}
}

async function viewReport(id) {
    try {
        const report = await api.get(`/history/${id}`);
        openDrawer(`报告详情 - ${report.stock_code}`, (body) => {
            body.innerHTML = `
                <div class="mb-3"><strong>${report.stock_name||''}(${report.stock_code})</strong> <span class="signal-badge ${report.signal}">${report.signal}</span></div>
                <div class="report-metrics mb-3">
                    <div class="metric"><label>评分</label><span>${report.total_score||'--'}/100</span></div>
                    <div class="metric"><label>价格</label><span>${formatNumber(report.current_price)}</span></div>
                    <div class="metric"><label>涨跌</label><span class="${(report.change_pct||0)>=0?'text-danger':'text-success'}">${formatPct(report.change_pct)}</span></div>
                </div>
                <div class="report-body">${report.full_report || report.summary || '无详细报告'}</div>
                <p class="report-footer">模型: ${report.llm_model||'--'} | 耗时: ${report.duration_seconds||'--'}秒 | Token: ${report.token_usage||'--'}</p>`;
        });
    } catch(e) { showToast('加载失败','error'); }
}

async function deleteReport(id) {
    if (!await confirmDialog('确认删除此分析报告？')) return;
    try { await api.delete(`/history/${id}`); loadHistory(); showToast('已删除','success'); } catch(e) {}
}

loadHistory();
</script>
</body>
</html>
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>分析历史 - 股票智能分析系统</title><link rel="stylesheet" th:href="@{/css/app.css}">
</head><body>
<div class="layout">
    <nav class="sidebar" th:replace="~{fragments/nav :: sidebar}"></nav>
    <main class="content">
        <header class="page-header"><h1>📋 分析历史</h1></header>
        <section class="section">
            <table class="data-table">
                <thead><tr><th>股票</th><th>信号</th><th>评分</th><th>价格</th><th>涨跌</th><th>模型</th><th>时间</th></tr></thead>
                <tbody>
                <tr th:each="r : ${reports}">
                    <td><a th:href="@{/web/analysis(code=${r.stockCode})}" th:text="${r.stockName} + '(' + ${r.stockCode} + ')'">-</a></td>
                    <td><span class="signal-badge" th:classappend="${r.signal}" th:text="${r.signal}">-</span></td>
                    <td th:text="${r.totalScore}">-</td>
                    <td th:text="${r.currentPrice}">-</td>
                    <td th:classappend="${r.changePct != null and r.changePct >= 0} ? 'positive' : 'negative'" th:text="${r.changePct != null} ? ${r.changePct} + '%' : '-'">-</td>
                    <td th:text="${r.llmModel}">-</td>
                    <td th:text="${#temporals.format(r.analysisDate, 'yyyy-MM-dd HH:mm')}">-</td>
                </tr>
                <tr th:if="${#lists.isEmpty(reports)}"><td colspan="7" class="empty">暂无历史记录</td></tr>
                </tbody>
            </table>
        </section>
    </main>
</div></body></html>
