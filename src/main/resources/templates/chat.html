<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI问股 - 股票智能分析系统</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
    <script src="https://cdn.jsdelivr.net/npm/marked@9.1.6/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/styles/github.min.css">
    <script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/highlight.min.js"></script>
</head>
<body>
<div class="layout">
    <nav class="sidebar" th:replace="~{fragments/nav :: sidebar}"></nav>
    <main class="content" style="padding:0;max-width:none;">
        <div class="chat-layout">
            <!-- 会话列表 -->
            <div class="chat-sidebar">
                <div class="chat-sidebar-header">
                    <button class="btn btn-primary w-full chat-new-btn" onclick="newSession()">+ New Chat</button>
                </div>
                <div id="sessionList" class="chat-session-list"></div>
            </div>
            <!-- 主聊天区 -->
            <div class="chat-main">
                <!-- 技能选择 -->
                <div class="chat-toolbar">
                    <span class="text-sm text-muted">技能:</span>
                    <div id="skillTags" class="skill-tags" style="margin:0;"></div>
                    <div style="margin-left:auto;">
                        <button class="btn btn-sm btn-ghost" onclick="exportChat()">📥 导出</button>
                    </div>
                </div>
                <!-- 消息区 -->
                <div id="chatMessages" class="chat-messages">
                    <div class="chat-welcome" id="chatEmpty">
                        <div class="chat-welcome-avatar">🤖</div>
                        <h2 class="chat-welcome-title">你好，有什么可以帮你？</h2>
                        <p class="chat-welcome-subtitle">我是AI问股助手，可以帮你分析股票、解读行情、制定策略</p>
                        <div class="chat-suggestions" id="quickQuestions"></div>
                    </div>
                </div>
                <!-- 输入 -->
                <div class="chat-input-area">
                    <div class="chat-input-wrapper">
                        <textarea id="chatInput" class="chat-textarea" placeholder="输入问题... (Ctrl+Enter 发送)" rows="1"></textarea>
                        <button type="button" id="sendBtn" class="chat-send-btn" onclick="sendMessage(event)">
                            <span class="send-icon">↑</span>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </main>
</div>
<script th:src="@{/js/app.js}"></script>
<script>
marked.setOptions({ breaks: true, gfm: true });

const SKILLS = [
    {id:'chan_theory',name:'缠论'},{id:'wave_theory',name:'波浪理论'},
    {id:'bull_trend',name:'牛趋势'},{id:'emotion_cycle',name:'情绪周期'},
    {id:'box_oscillation',name:'箱体震荡'},{id:'shrink_pullback',name:'缩量回调'},
];
const QUICK_QUESTIONS = [
    {label:'用缠论分析茅台',skill:'chan_theory',icon:'📈'},
    {label:'波浪理论看宁德时代',skill:'wave_theory',icon:'🌊'},
    {label:'分析比亚迪趋势',skill:'bull_trend',icon:'🚀'},
    {label:'分析腾讯 hk00700',skill:'bull_trend',icon:'🌏'},
];

let currentSessionId = null;
let selectedSkills = [];
let isStreaming = false;
let sessions = [];
let abortController = null;

// 初始化技能标签
function renderSkillTags() {
    const container = document.getElementById('skillTags');
    container.innerHTML = SKILLS.map(s => 
        `<span class="skill-tag ${selectedSkills.includes(s.id)?'selected':''}" onclick="toggleSkill('${s.id}')">${s.name}</span>`
    ).join('');
}
function toggleSkill(id) {
    if (selectedSkills.includes(id)) selectedSkills = selectedSkills.filter(s => s !== id);
    else if (selectedSkills.length < 3) selectedSkills.push(id);
    renderSkillTags();
}

// 快速问题 - 卡片式建议
function renderQuickQuestions() {
    const container = document.getElementById('quickQuestions');
    if (!container) return;
    container.innerHTML = QUICK_QUESTIONS.map(q =>
        `<div class="suggestion-card" onclick="askQuick('${q.label}','${q.skill}')">
            <span class="suggestion-icon">${q.icon}</span>
            <span class="suggestion-text">${q.label}</span>
            <span class="suggestion-arrow">→</span>
        </div>`
    ).join('');
}

function askQuick(label, skill) {
    document.getElementById('chatInput').value = label;
    if (!selectedSkills.includes(skill)) { selectedSkills = [skill]; renderSkillTags(); }
    sendMessage(new Event('submit'));
}

// Textarea 自动展开
function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 150) + 'px';
}

// 发送消息
async function sendMessage(e) {
    e.preventDefault();
    if (isStreaming) return;
    const input = document.getElementById('chatInput');
    const msg = input.value.trim();
    if (!msg) return;

    if (!currentSessionId) currentSessionId = 'web_' + Date.now();

    document.getElementById('chatEmpty')?.remove();
    appendMessage('user', msg);
    input.value = '';
    input.style.height = 'auto';
    setStreaming(true);

    const assistantDiv = createAssistantPlaceholder();
    let fullText = '';
    abortController = new AbortController();

    try {
        const response = await fetch('/api/v1/agent/chat/stream', {
            method: 'POST', credentials: 'include',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ message: msg, session_id: currentSessionId, skills: selectedSkills.length > 0 ? selectedSkills : undefined }),
            signal: abortController.signal
        });
        if (!response.ok) throw new Error('HTTP ' + response.status);

        const reader = response.body.getReader();
        const decoder = new TextDecoder();
        let buffer = '';
        while (true) {
            const { done, value } = await reader.read();
            if (done) break;
            buffer += decoder.decode(value, { stream: true });
            const lines = buffer.split('\n');
            buffer = lines.pop();
            for (const line of lines) {
                if (line.startsWith('event:') && line.includes('done')) break;
                if (line.startsWith('data:')) { fullText += line.substring(5); renderMarkdown(assistantDiv, fullText); }
            }
        }
        if (fullText) { renderMarkdown(assistantDiv, fullText); markComplete(assistantDiv); }
        else assistantDiv.querySelector('.md-content').textContent = '✅ 完成';
    } catch (err) {
        if (err.name === 'AbortError') {
            if (fullText) { renderMarkdown(assistantDiv, fullText); markStopped(assistantDiv); }
            else assistantDiv.querySelector('.md-content').innerHTML = '<span class="chat-status stopped">■ 已停止</span>';
        } else {
            assistantDiv.querySelector('.md-content').innerHTML = '<span class="chat-status error">❌ 请求失败: ' + err.message + '</span>';
        }
    } finally { abortController = null; setStreaming(false); loadSessions(); }
}

function stopGeneration() {
    if (abortController) abortController.abort();
}

function appendMessage(role, text) {
    const container = document.getElementById('chatMessages');
    const div = document.createElement('div');
    div.className = 'message ' + role;
    if (role === 'user') {
        div.innerHTML = `<div class="message-content">${escapeHtml(text)}</div>`;
    } else {
        div.textContent = text;
    }
    container.appendChild(div);
    container.scrollTop = container.scrollHeight;
}

function createAssistantPlaceholder() {
    const container = document.getElementById('chatMessages');
    const div = document.createElement('div');
    div.className = 'message assistant';
    div.innerHTML = `<div class="message-header"><span class="skill-label">🔧 分析中</span></div><div class="md-content"><span class="typing-indicator"><span></span><span></span><span></span></span></div>`;
    container.appendChild(div);
    container.scrollTop = container.scrollHeight;
    return div;
}

function markComplete(el) {
    const header = el.querySelector('.message-header');
    if (header) header.innerHTML = '<span class="skill-label">🔧 skills</span><span class="chat-status complete">✅ 完成</span>';
}
function markStopped(el) {
    const header = el.querySelector('.message-header');
    if (header) header.innerHTML = '<span class="skill-label">🔧 skills</span><span class="chat-status stopped">■ 已停止</span>';
}

function renderMarkdown(el, text) {
    const content = el.querySelector('.md-content');
    content.innerHTML = marked.parse(text);
    content.querySelectorAll('pre code').forEach(block => hljs.highlightElement(block));
    document.getElementById('chatMessages').scrollTop = document.getElementById('chatMessages').scrollHeight;
}

function setStreaming(val) {
    isStreaming = val;
    const btn = document.getElementById('sendBtn');
    const input = document.getElementById('chatInput');
    input.disabled = val;
    if (val) {
        btn.innerHTML = '<span class="stop-icon">■</span>';
        btn.classList.add('streaming');
        btn.onclick = stopGeneration;
    } else {
        btn.innerHTML = '<span class="send-icon">↑</span>';
        btn.classList.remove('streaming');
        btn.onclick = sendMessage;
        btn.disabled = false;
    }
}

function escapeHtml(text) {
    const d = document.createElement('div');
    d.textContent = text;
    return d.innerHTML;
}

// 会话管理
async function loadSessions() {
    try {
        const data = await api.get('/agent/chat/sessions', { limit: 30 });
        sessions = data.sessions || [];
        renderSessions();
    } catch(e) { /* ignore */ }
}

function renderSessions() {
    const container = document.getElementById('sessionList');
    container.innerHTML = sessions.map(s => `
        <div class="chat-session-item ${s.session_id === currentSessionId ? 'active' : ''}" onclick="switchSession('${s.session_id}')">
            <span class="truncate" style="flex:1">${s.title || '新对话'}</span>
            <button class="btn-ghost" style="font-size:.7rem;padding:2px 4px;" onclick="event.stopPropagation();deleteSession('${s.session_id}')">✕</button>
        </div>
    `).join('');
}

function newSession() {
    currentSessionId = 'web_' + Date.now();
    const container = document.getElementById('chatMessages');
    container.innerHTML = '';
    const welcome = document.createElement('div');
    welcome.className = 'chat-welcome';
    welcome.id = 'chatEmpty';
    welcome.innerHTML = `<div class="chat-welcome-avatar">🤖</div><h2 class="chat-welcome-title">开始新的对话</h2><p class="chat-welcome-subtitle">问我任何关于股票分析的问题</p><div class="chat-suggestions" id="quickQuestions"></div>`;
    container.appendChild(welcome);
    renderQuickQuestions();
    renderSessions();
}

async function switchSession(sessionId) {
    currentSessionId = sessionId;
    renderSessions();
    try {
        const data = await api.get(`/agent/chat/sessions/${sessionId}`);
        const messages = data.messages || [];
        const container = document.getElementById('chatMessages');
        container.innerHTML = '';
        messages.forEach(m => {
            const div = document.createElement('div');
            div.className = 'message ' + m.role;
            if (m.role === 'assistant') {
                div.innerHTML = `<div class="message-header"><span class="skill-label">🔧 skills</span><span class="chat-status complete">✅ 完成</span></div><div class="md-content">${marked.parse(m.content)}</div>`;
            } else {
                div.innerHTML = `<div class="message-content">${escapeHtml(m.content)}</div>`;
            }
            container.appendChild(div);
        });
        container.querySelectorAll('pre code').forEach(block => hljs.highlightElement(block));
        container.scrollTop = container.scrollHeight;
    } catch(e) { showToast('加载会话失败', 'error'); }
}

async function deleteSession(sessionId) {
    if (!await confirmDialog('确认删除此会话？')) return;
    try { await api.delete(`/agent/chat/sessions/${sessionId}`); loadSessions(); } catch(e) {}
}

function exportChat() {
    const messages = document.querySelectorAll('#chatMessages .message');
    let md = '# AI问股对话导出\n\n';
    messages.forEach(m => {
        if (m.classList.contains('user')) md += '**用户**: ' + m.textContent + '\n\n';
        else if (m.classList.contains('assistant')) md += '**助手**: ' + (m.querySelector('.md-content')?.textContent || '') + '\n\n';
    });
    const blob = new Blob([md], { type: 'text/markdown' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `chat_${new Date().toISOString().slice(0,10)}.md`;
    a.click();
}

// 初始化
const chatInput = document.getElementById('chatInput');
chatInput.addEventListener('input', function() { autoResize(this); });
chatInput.addEventListener('keydown', function(e) {
    if (e.key === 'Enter' && e.ctrlKey) {
        e.preventDefault();
        sendMessage(e);
    }
    // Enter without modifier adds newline (default textarea behavior)
});

renderSkillTags();
renderQuickQuestions();
initChat();

async function initChat() {
    try {
        const data = await api.get('/agent/chat/sessions', { limit: 30 });
        sessions = data.sessions || [];
        renderSessions();
        if (sessions.length > 0) {
            await switchSession(sessions[0].session_id);
        } else {
            currentSessionId = 'web_' + Date.now();
        }
    } catch(e) {
        currentSessionId = 'web_' + Date.now();
    }
}
</script>
</body>
</html>
