# 股票智能分析系统 - Java版配置

server:
  port: ${SERVER_PORT:8000}
  address: ${SERVER_HOST:0.0.0.0}
  # 优雅停机: 缩短关闭等待, 避免请求处理中途断开
  shutdown: graceful

spring:
  application:
    name: daily-stock-analysis

  # 关闭阶段超时: 缩短 SmartLifecycle 各 phase 等待时间, 大幅加速关闭
  lifecycle:
    timeout-per-shutdown-phase: 3s

  # SQLite数据库配置 (存储在 ~/.j_daily-alphaforge-analysis/data/ 下)
  datasource:
    url: jdbc:sqlite:${app.home}/data/stock_analysis.db
    driver-class-name: org.sqlite.JDBC
    # HikariCP 参数: SQLite 为文件级锁, 无需大连接池, 减小可加速启停
    hikari:
      maximum-pool-size: 5
      minimum-idle: 1
      # 启动时快速建立连接, 失败快速暴露
      initialization-fail-timeout: 5000
      connection-timeout: 10000
      # 空闲连接快速回收, 加速关闭
      idle-timeout: 30000
      max-lifetime: 600000
      # 关闭时不再等待空闲检测
      leak-detection-threshold: 0

  # SQL初始化配置
  sql:
    init:
      # schema.sql 全部使用 CREATE TABLE IF NOT EXISTS, 重复执行幂等安全
      # SQLite 驱动不被 Spring 识别为嵌入式库, 必须用 always 才能建表
      mode: always
      schema-locations: classpath:schema.sql

  # Jackson JSON配置
  jackson:
    serialization:
      write-dates-as-timestamps: false
    default-property-inclusion: non_null
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai

# MyBatis配置
mybatis:
  mapper-locations: classpath:mapper/*.xml
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl

# 日志配置
logging:
  level:
    root: INFO
    com.stock: INFO
    org.springframework.jdbc: WARN
  pattern:
    console: "%d{HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
