# 股票智能分析系统 - Java版配置

server:
  port: ${SERVER_PORT:8000}
  address: ${SERVER_HOST:0.0.0.0}
  # 优雅停机: 缩短关闭等待, 避免请求处理中途断开
  shutdown: graceful

spring:
  application:
    name: alpha-forge

  # 关闭阶段超时: 缩短 SmartLifecycle 各 phase 等待时间, 大幅加速关闭
  lifecycle:
    timeout-per-shutdown-phase: 3s

  # SQLite数据库配置 (存储在 ~/.alphaforge/data/ 下)
  datasource:
    url: jdbc:sqlite:${app.home}/data/stock_analysis.db
    driver-class-name: org.sqlite.JDBC
    # Druid 参数: SQLite 为文件级锁, 无需大连接池, 减小可加速启停
    druid:
      initial-size: 1
      min-idle: 1
      max-active: 5
      # 获取连接最大等待时间 (毫秒)
      max-wait: 10000
      # 空闲连接回收 (毫秒)
      min-evictable-idle-time-millis: 30000
      max-evictable-idle-time-millis: 60000
      # 物理连接超时 (毫秒)
      phy-timeout-millis: 600000
      # 连接校验
      validation-query: SELECT 1
      test-while-idle: true
      test-on-borrow: false
      test-on-return: false

  # SQL初始化配置
  sql:
    init:
      # schema.sql 全部使用 CREATE TABLE IF NOT EXISTS, 重复执行幂等安全
      # SQLite 驱动不被 Spring 识别为嵌入式库, 必须用 always 才能建表
      mode: always
      schema-locations: classpath:schema.sql

  # Jackson JSON配置
  jackson:
    serialization:
      write-dates-as-timestamps: false
    default-property-inclusion: non_null
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai

# MyBatis配置
mybatis:
  mapper-locations: classpath:mapper/*.xml
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl

# 日志配置
logging:
  level:
    root: INFO
    com.stock: INFO
    org.springframework.jdbc: WARN
  pattern:
    console: "%d{HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"

# 监控端点配置 (Micrometer + Prometheus)
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when_authorized
  metrics:
    tags:
      application: alpha-forge
